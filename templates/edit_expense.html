<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

    body{
        min-height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;

        background:
        linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed,
        #9333ea
        );

        transition:0.4s;
    }

    .edit-card{

        width:600px;

        padding:40px;

        background:
        rgba(255,255,255,0.15);

        backdrop-filter:blur(15px);

        border-radius:25px;

        box-shadow:
        0 15px 35px rgba(0,0,0,0.25);

        color:white;
    }

    .edit-card h2{

        text-align:center;

        margin-bottom:25px;

        font-weight:bold;
    }

    .form-control{

        height:55px;

        border-radius:12px;

        margin-bottom:15px;
    }

    .update-btn{

        width:100%;

        height:55px;

        border:none;

        border-radius:12px;

        background:
        linear-gradient(
        135deg,
        #f59e0b,
        #f97316
        );

        color:white;

        font-size:18px;

        font-weight:bold;
    }

    .back-btn{

        width:100%;

        margin-top:12px;

        border-radius:12px;
    }

    .theme-btn{

        width:100%;

        margin-bottom:15px;

        border-radius:12px;
    }

    /* DARK MODE */

    .dark-mode{

        background:#121212 !important;
    }

    .dark-mode .edit-card{

        background:#1f2937 !important;

        color:white !important;
    }

    .dark-mode .form-control{

        background:#374151 !important;

        color:white !important;

        border:1px solid #6b7280;
    }

    .dark-mode .form-control::placeholder{

        color:#d1d5db;
    }

    </style>

</head>

<body>

<div class="edit-card">

    <button
        onclick="toggleTheme()"
        class="btn btn-warning theme-btn">

        🌙 Dark / Light Mode

    </button>

    <h2>✏️ Edit Expense</h2>

    <form method="POST">

        <input
            type="text"
            name="category"
            class="form-control"
            value="{{ expense.category }}"
            required>

        <input
            type="number"
            name="amount"
            class="form-control"
            value="{{ expense.amount }}"
            required>

        <input
            type="text"
            name="description"
            class="form-control"
            value="{{ expense.description }}"
            required>

        <input
            type="date"
            name="date"
            class="form-control"
            value="{{ expense.date }}"
            required>

        <button
            type="submit"
            class="update-btn">

            Update Expense

        </button>

    </form>

    <a href="/view_expenses"
       class="btn btn-light back-btn">

       ⬅ Back to Expenses

    </a>

</div>

<script>

function toggleTheme(){

    document.body.classList.toggle(
        "dark-mode"
    );

    localStorage.setItem(
        "theme",
        document.body.classList.contains(
            "dark-mode"
        )
    );
}

window.onload = function(){

    if(
        localStorage.getItem(
            "theme"
        ) === "true"
    ){

        document.body.classList.add(
            "dark-mode"
        );
    }
}

</script>

</body>
</html>
