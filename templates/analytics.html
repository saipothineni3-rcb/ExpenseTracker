<!DOCTYPE html>
<html>
<head>

<title>Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed,
        #9333ea
    );

    min-height:100vh;

    padding:40px;

    transition:0.4s;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);

    background:rgba(255,255,255,0.95);

    backdrop-filter:blur(10px);
}

h1{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

/* DARK MODE */

.dark-mode{

    background:#121212 !important;
}

.dark-mode .card{

    background:#1f2937 !important;

    color:white !important;
}

.dark-mode h1{

    color:white;
}

.dark-mode h5{

    color:white;
}

.dark-mode .btn-light{

    background:#374151;
    color:white;
    border:none;
}

.theme-btn{

    margin-right:10px;
}

</style>

</head>

<body>

<h1>📊 Expense Analytics Dashboard</h1>

<div class="text-center mb-4">

    <button
        onclick="toggleTheme()"
        class="btn btn-warning theme-btn">

        🌙 Theme

    </button>

    <a href="/dashboard"
       class="btn btn-light">

       ← Back Dashboard

    </a>

</div>

<div class="row">

<div class="col-md-6 mb-4">

<div class="card p-3">

<h5>🥧 Expense Distribution</h5>

<canvas id="pieChart"></canvas>

</div>

</div>

<div class="col-md-6 mb-4">

<div class="card p-3">

<h5>📊 Category Expenses</h5>

<canvas id="barChart"></canvas>

</div>

</div>

<div class="col-md-12 mb-4">

<div class="card p-3">

<h5>📈 Monthly Expense Trend</h5>

<canvas id="lineChart"></canvas>

</div>

</div>

</div>

<script>

let categories = {{ categories|tojson }};
let amounts = {{ amounts|tojson }};

let months = {{ months|tojson }};
let monthlyAmounts = {{ monthly_amounts|tojson }};

new Chart(
document.getElementById('pieChart'),
{
type:'pie',
data:{
labels:categories,
datasets:[{
data:amounts
}]
}
});

new Chart(
document.getElementById('barChart'),
{
type:'bar',
data:{
labels:categories,
datasets:[{
label:'Expenses',
data:amounts
}]
}
});

new Chart(
document.getElementById('lineChart'),
{
type:'line',
data:{
labels:months,
datasets:[{
label:'Monthly Expenses',
data:monthlyAmounts,
fill:false,
tension:0.3
}]
}
});

/* DARK MODE */

function toggleTheme(){

    document.body.classList.toggle(
        "dark-mode"
    );

    localStorage.setItem(
        "theme",
        document.body.classList.contains(
            "dark-mode"
        )
    );
}

window.onload = function(){

    if(
        localStorage.getItem(
            "theme"
        ) === "true"
    ){

        document.body.classList.add(
            "dark-mode"
        );
    }
}

</script>

</body>
</html>
