<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

    body{
        min-height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;

        background:
        linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed,
        #9333ea
        );
    }

    .card-box{

        width:500px;

        padding:40px;

        background:
        rgba(255,255,255,0.15);

        backdrop-filter:blur(15px);

        border-radius:25px;

        color:white;
    }

    .form-control{

        margin-bottom:15px;

        height:50px;
    }

    </style>

</head>

<body>

<div class="card-box">

<h2 class="text-center mb-4">
🔐 Change Password
</h2>

<form method="POST">

<input
type="password"
name="current_password"
class="form-control"
placeholder="Current Password"
required>

<input
type="password"
name="new_password"
class="form-control"
placeholder="New Password"
required>

<button
type="submit"
class="btn btn-success w-100">

Update Password

</button>

</form>

<br>

<a href="/profile"
class="btn btn-light w-100">

⬅ Back to Profile

</a>

</div>

</body>
</html>
