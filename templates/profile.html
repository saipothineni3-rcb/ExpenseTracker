<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

    body{

        min-height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;

        background:
        linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed,
        #9333ea
        );

        transition:0.4s;
    }

    .profile-card{

        width:600px;

        padding:40px;

        background:
        rgba(255,255,255,0.15);

        backdrop-filter:blur(15px);

        border-radius:25px;

        box-shadow:
        0 15px 35px rgba(0,0,0,0.25);

        color:white;
    }

    h2{

        text-align:center;

        margin-bottom:25px;
    }

    .info{

        background:
        rgba(255,255,255,0.10);

        padding:15px;

        border-radius:12px;

        margin-bottom:15px;

        font-size:18px;
    }

    .theme-btn{

        width:100%;

        margin-bottom:15px;

        border-radius:12px;
    }

    .back-btn{

        width:100%;

        margin-top:10px;

        border-radius:12px;
    }

    /* DARK MODE */

    .dark-mode{

        background:#121212 !important;
    }

    .dark-mode .profile-card{

        background:#1f2937 !important;

        color:white !important;
    }

    .dark-mode .info{

        background:#374151 !important;

        color:white !important;
    }

    </style>

</head>

<body>

<div class="profile-card">

    <button
        onclick="toggleTheme()"
        class="btn btn-warning theme-btn">

        🌙 Dark / Light Mode

    </button>

    <h2>👤 My Profile</h2>

    <div class="info">
        <strong>Name:</strong>
        {{ user.name }}
    </div>

    <div class="info">
        <strong>Email:</strong>
        {{ user.email }}
    </div>

    <div class="info">
        <strong>Phone:</strong>
        {{ user.phone }}
    </div>
    <a href="/change_password"
   class="btn btn-success w-100 mb-3">

   🔐 Change Password

</a>

    <a href="/dashboard"
       class="btn btn-light back-btn">

       ⬅ Back to Dashboard

    </a>

</div>

<script>

function toggleTheme(){

    document.body.classList.toggle(
        "dark-mode"
    );

    localStorage.setItem(
        "theme",
        document.body.classList.contains(
            "dark-mode"
        )
    );
}

window.onload = function(){

    if(
        localStorage.getItem(
            "theme"
        ) === "true"
    ){

        document.body.classList.add(
            "dark-mode"
        );
    }
}

</script>

</body>
</html>
