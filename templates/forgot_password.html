<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed,
                #9333ea
            );
        }

        .card{

            width:450px;

            background:white;

            padding:40px;

            border-radius:20px;

            box-shadow:
            0 20px 50px rgba(0,0,0,0.25);
        }

        h1{

            text-align:center;

            color:#5B4BFF;

            margin-bottom:30px;
        }

        .form-control{

            width:100%;

            height:50px;

            padding:12px;

            margin-bottom:20px;

            border:1px solid #ddd;

            border-radius:10px;

            font-size:16px;
        }

        .form-control:focus{

            outline:none;

            border-color:#5B4BFF;

            box-shadow:
            0 0 10px rgba(91,75,255,0.3);
        }

        .btn{

            width:100%;

            height:50px;

            border:none;

            border-radius:10px;

            font-size:18px;

            font-weight:bold;

            color:white;

            cursor:pointer;

            background:
            linear-gradient(
                135deg,
                #5B4BFF,
                #7A5FFF
            );
        }

        .btn:hover{

            transform:translateY(-2px);

            transition:0.3s;
        }

        .back-btn{

            display:inline-block;

            margin-bottom:20px;

            text-decoration:none;

            color:#5B4BFF;

            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="card">

    <a href="/login" class="back-btn">
        ← Back to Login
    </a>

    <h1>Verify Account</h1>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Registered Email"
            class="form-control"
            required>

        <input
            type="text"
            name="last4"
            placeholder="Last 4 digits of Phone"
            maxlength="4"
            class="form-control"
            required>

        <button
            type="submit"
            class="btn">
            Verify
        </button>

    </form>

</div>

</body>
</html>
