<!DOCTYPE html>
<html>
<head>

    <title>Import Excel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

    body{
        min-height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;

        background:
        linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed,
        #9333ea
        );

        transition:0.4s;
    }

    .card-box{

        width:550px;

        padding:40px;

        background:
        rgba(255,255,255,0.15);

        backdrop-filter:blur(15px);

        border-radius:25px;

        color:white;

        box-shadow:
        0 15px 35px rgba(0,0,0,0.25);
    }

    h2{

        text-align:center;

        margin-bottom:25px;

        font-weight:bold;
    }

    .theme-btn{

        width:100%;

        margin-bottom:15px;

        border-radius:12px;
    }

    .upload-btn{

        width:100%;

        height:55px;

        border:none;

        border-radius:12px;

        background:
        linear-gradient(
        135deg,
        #10b981,
        #059669
        );

        color:white;

        font-size:18px;

        font-weight:bold;
    }

    .upload-btn:hover{

        transform:translateY(-2px);

        transition:0.3s;
    }

    .back-btn{

        width:100%;

        margin-top:12px;

        border-radius:12px;
    }

    .form-control{

        height:55px;

        border-radius:12px;
    }

    /* DARK MODE */

    .dark-mode{

        background:#121212 !important;
    }

    .dark-mode .card-box{

        background:#1f2937 !important;

        color:white !important;
    }

    .dark-mode .form-control{

        background:#374151 !important;

        color:white !important;

        border:1px solid #6b7280;
    }

    </style>

</head>

<body>

<div class="card-box">

    <button
        onclick="toggleTheme()"
        class="btn btn-warning theme-btn">

        🌙 Dark / Light Mode

    </button>

    <h2>
        📥 Import Expenses from Excel
    </h2>

    <form
        method="POST"
        enctype="multipart/form-data">

        <input
            type="file"
            name="file"
            class="form-control mb-3"
            accept=".xlsx,.xls"
            required>

        <button
            type="submit"
            class="upload-btn">

            Upload Excel File

        </button>

    </form>

    <a href="/dashboard"
       class="btn btn-light back-btn">

       ⬅ Back to Dashboard

    </a>

</div>

<script>

function toggleTheme(){

    document.body.classList.toggle(
        "dark-mode"
    );

    localStorage.setItem(
        "theme",
        document.body.classList.contains(
            "dark-mode"
        )
    );
}

window.onload = function(){

    if(
        localStorage.getItem(
            "theme"
        ) === "true"
    ){

        document.body.classList.add(
            "dark-mode"
        );
    }
}

</script>

</body>
</html>
