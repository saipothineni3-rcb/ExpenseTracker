<!DOCTYPE html>
<html>

<head>

<title>Set Goal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body
style="
background:#111827;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
">

<div class="card p-4"
style="
width:500px;
border-radius:20px;
">

<h2 class="text-center mb-4">
🎯 Set Savings Goal
</h2>

<form method="POST">

<input
type="number"
name="target_amount"
class="form-control mb-3"
placeholder="Enter Goal Amount"
required>

<button
type="submit"
class="btn btn-success w-100">

Save Goal

</button>

</form>

<a href="/dashboard"
class="btn btn-secondary w-100 mt-3">

Back Dashboard

</a>

</div>

</body>

</html>
