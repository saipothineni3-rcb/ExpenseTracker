<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

    body{

        min-height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;

        background:
        linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed,
        #9333ea
        );
    }

    .expense-card{

        width:550px;

        padding:40px;

        background:
        rgba(255,255,255,0.15);

        backdrop-filter:blur(15px);

        border-radius:25px;

        box-shadow:
        0 15px 35px rgba(0,0,0,0.25);

        color:white;
    }

    .expense-card h2{

        text-align:center;

        margin-bottom:25px;

        font-weight:bold;
    }

    .form-control{

        height:55px;

        border-radius:12px;

        margin-bottom:15px;

        border:none;
    }

    .btn-save{

        width:100%;

        height:55px;

        border:none;

        border-radius:12px;

        background:
        linear-gradient(
        135deg,
        #22c55e,
        #16a34a
        );

        color:white;

        font-size:18px;

        font-weight:bold;

        margin-top:10px;
    }

    .btn-save:hover{

        transform:translateY(-2px);

        transition:0.3s;
    }

    .btn-back{

        width:100%;

        margin-top:15px;

        border-radius:12px;
    }

    .theme-btn{

        width:100%;

        margin-bottom:15px;

        border-radius:12px;
    }

    .dark-mode{

        background:#121212 !important;
    }

    .dark-mode .expense-card{

        background:#1f2937 !important;

        color:white !important;
    }

    </style>

</head>

<body>

<div class="expense-card">

    <button
        onclick="toggleTheme()"
        class="btn btn-warning theme-btn">

        🌙 Dark / Light Mode

    </button>

    <h2>💸 Add Expense</h2>

    <form
method="POST"
enctype="multipart/form-data">

        <select
            name="category"
            class="form-control"
            required>

            <option value="">
                Select Category
            </option>

            <option value="Food">
                🍔 Food
            </option>

            <option value="Travel">
                ✈️ Travel
            </option>

            <option value="Shopping">
                🛍️ Shopping
            </option>

            <option value="Rent">
                🏠 Rent
            </option>

            <option value="Education">
                🎓 Education
            </option>

            <option value="Medical">
                💊 Medical
            </option>

        </select>

        <input
            type="number"
            name="amount"
            class="form-control"
            placeholder="Amount"
            required>

        <input
            type="text"
            name="description"
            class="form-control"
            placeholder="Description"
            required>
            <label class="mt-2">
    Upload Receipt
</label>

<input
type="file"
name="receipt"
class="form-control"
accept="image/*">

        <input
            type="date"
            name="date"
            class="form-control"
            required>

        <button
            type="submit"
            class="btn-save">

            Add Expense

        </button>

    </form>

    <a href="/dashboard"
       class="btn btn-light btn-back">

       ⬅ Back to Dashboard

    </a>

</div>

<script>

function toggleTheme(){

    document.body.classList.toggle(
        "dark-mode"
    );

    localStorage.setItem(
        "theme",
        document.body.classList.contains(
            "dark-mode"
        )
    );
}

window.onload = function(){

    if(
        localStorage.getItem(
            "theme"
        ) === "true"
    ){

        document.body.classList.add(
            "dark-mode"
        );
    }
}

</script>

</body>
</html>
