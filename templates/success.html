<!DOCTYPE html>
<html>
<head>
    <title>Success</title>

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed
            );
            font-family:'Segoe UI',sans-serif;
        }

        .card{

            width:450px;

            background:white;

            padding:40px;

            border-radius:20px;

            text-align:center;

            box-shadow:
            0 20px 50px rgba(0,0,0,0.25);
        }

        .icon{
            font-size:70px;
        }

        h2{
            color:#16a34a;
            margin:20px 0;
        }

        .btn{

            display:inline-block;

            padding:12px 30px;

            background:#5B4BFF;

            color:white;

            text-decoration:none;

            border-radius:10px;
        }

    </style>

</head>

<body>

<div class="card">

    <div class="icon">
        ✅
    </div>

    <h2>Password Updated Successfully</h2>

    <p>
        You can now login with your new password.
    </p>

    <br>

    <a href="/login" class="btn">
        Go to Login
    </a>

</div>

</body>
</html>
