<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">
</head>

<body>

<div class="container">

    <div class="login-card">

        <!-- LEFT SIDE -->

        <div class="login-left">

            <h2>Login to System</h2>

            <p>
                Please enter your login information
            </p>

            <form method="POST">

                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

                <button type="submit">
                    Login
                </button>
                <div class="text-center mt-3">

    <a href="/forgot_password">
        Forgot Password?
    </a>

</div>

            </form>

            <div class="register-link">
                Don't have an account?
                <a href="/register">
                    Register
                </a>
            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="login-right">

            <img
                src="{{ url_for('static', filename='images/finance3d.png') }}"
                alt="Finance Illustration"
                class="theme-image">

        </div>

    </div>

</div>

</body>
</html>
