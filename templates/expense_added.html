<!DOCTYPE html>
<html>
<head>
    <title>Expense Added</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed,
                #ec4899
            );
        }

        .card-box{

            background:white;

            padding:50px;

            border-radius:25px;

            text-align:center;

            width:500px;

            box-shadow:
            0 20px 40px rgba(0,0,0,0.2);
        }

        .icon{
            font-size:80px;
        }

        h2{
            margin-top:20px;
            margin-bottom:15px;
        }

        .btn-back{

            background:
            linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed
            );

            color:white;

            padding:12px 30px;

            border-radius:10px;

            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="card-box">

    <div class="icon">✅</div>

    <h2>Expense Added Successfully</h2>

    <p>
        Your expense has been saved.
    </p>

    <a href="/dashboard"
       class="btn-back">
       ← Back to Dashboard
    </a>

</div>

</body>
</html>
